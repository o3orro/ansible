---
# Task
#################################
# 1) /etc/ansible/facts.d 디렉토리 생성
# 2) /etc/ansible/facts.d/custom.fact 파일 배포
#################################

# 1) /etc/ansible/facts.d 디렉토리 생성
- name: 1) /etc/ansible/facts.d 디렉토리 생성
  ansible.builtin.file:
    path: /etc/ansible/facts.d
    state: directory
    mode: '0755'

# 2) /etc/ansible/facts.d/custom.fact 파일 배포
- name: 2) /etc/ansible/facts.d/{{ file_src_fact }} 파일 배포
  ansible.builtin.copy:
    src: "{{ dir_src_fact }}/{{ file_src_fact }}"  # files/custom.fact
    dest: "/etc/ansible/facts.d/{{ file_src_fact }}"
    mode: '0644'