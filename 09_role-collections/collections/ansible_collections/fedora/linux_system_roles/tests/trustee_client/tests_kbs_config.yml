---
- name: Ensure KBS URL and certificate are configured in trustee-gc config files
  hosts: all
  vars:
    trustee_client_trustee_gc: true
    trustee_client_encrypt_disk: false
    trustee_client_kbs_url: "https://kbs.example.com:8080"
    trustee_client_kbs_cert_content: "-----BEGIN CERTIFICATE-----\nMIIBIjANBgkq\n-----END CERTIFICATE-----"
  tasks:
    - name: Run the tests
      block:
        - name: Run the role
          ansible.builtin.include_tasks:
            file: tasks/run_role_with_clear_facts.yml
          vars:
            __sr_public: true

        - name: Flush handlers to start services created by the role
          ansible.builtin.meta: flush_handlers

        - name: Stat CDH config file
          stat:
            path: /etc/trustee-gc/cdh/config.toml
          register: __test_cdh_config

        - name: Verify CDH config contains KBS URL
          when: __test_cdh_config.stat.exists
          block:
            - name: Read CDH config file
              slurp:
                src: /etc/trustee-gc/cdh/config.toml
              register: __test_cdh_content

            - name: Assert CDH config contains the KBS URL
              assert:
                that:
                  - >-
                    trustee_client_kbs_url in
                    (__test_cdh_content.content | b64decode)
                fail_msg: >-
                  KBS URL '{{ trustee_client_kbs_url }}' not found in
                  /etc/trustee-gc/cdh/config.toml

            - name: Assert CDH config does not contain the KBS_URL placeholder
              assert:
                that:
                  - >-
                    'KBS_URL' not in
                    (__test_cdh_content.content | b64decode)
                fail_msg: >-
                  Unreplaced placeholder KBS_URL still present in
                  /etc/trustee-gc/cdh/config.toml

        - name: Stat AA config file
          stat:
            path: /etc/trustee-gc/aa/config.toml
          register: __test_aa_config

        - name: Verify AA config contains KBS URL
          when: __test_aa_config.stat.exists
          block:
            - name: Read AA config file
              slurp:
                src: /etc/trustee-gc/aa/config.toml
              register: __test_aa_content

            - name: Assert AA config contains the KBS URL
              assert:
                that:
                  - >-
                    trustee_client_kbs_url in
                    (__test_aa_content.content | b64decode)
                fail_msg: >-
                  KBS URL '{{ trustee_client_kbs_url }}' not found in
                  /etc/trustee-gc/aa/config.toml

            - name: Assert AA config does not contain the KBS_URL placeholder
              assert:
                that:
                  - >-
                    'KBS_URL' not in
                    (__test_aa_content.content | b64decode)
                fail_msg: >-
                  Unreplaced placeholder KBS_URL still present in
                  /etc/trustee-gc/aa/config.toml

        - name: Assert at least one trustee-gc config file was found
          assert:
            that:
              - __test_cdh_config.stat.exists or __test_aa_config.stat.exists
            fail_msg: >-
              Neither /etc/trustee-gc/cdh/config.toml nor
              /etc/trustee-gc/aa/config.toml was found after role execution

        - name: Stat KBS certificate file
          stat:
            path: /etc/trustee-gc/server.crt
          register: __test_kbs_cert

        - name: Assert KBS certificate was written
          assert:
            that: __test_kbs_cert.stat.exists
            fail_msg: "KBS certificate /etc/trustee-gc/server.crt was not written"
      always:
        - name: Cleanup trustee_client test resources
          ansible.builtin.include_tasks:
            file: tasks/cleanup.yml
          tags:
            - tests::cleanup

- name: Ensure KBS certificate from path is configured in trustee-gc config files
  hosts: all
  vars:
    trustee_client_trustee_gc: true
    trustee_client_encrypt_disk: false
    trustee_client_kbs_url: "https://kbs.example.com:8080"
    trustee_client_kbs_cert_content: ""
    __test_cert_content: "-----BEGIN CERTIFICATE-----\nMIIBIjANBgkq\n-----END CERTIFICATE-----"
  tasks:
    - name: Run the tests
      block:
        - name: Create cert file on control node for path test
          ansible.builtin.copy:
            content: "{{ __test_cert_content }}"
            dest: "{{ playbook_dir }}/kbs_test_cert.crt"
            mode: "0644"
          run_once: true
          delegate_to: localhost

        - name: Run trustee_client role with KBS cert from path
          ansible.builtin.include_role:
            name: fedora.linux_system_roles.trustee_client
            public: true
          vars:
            trustee_client_kbs_cert_src: "{{ playbook_dir }}/kbs_test_cert.crt"

        - name: Flush handlers to start services created by the role
          ansible.builtin.meta: flush_handlers

        - name: Stat CDH config file
          ansible.builtin.stat:
            path: /etc/trustee-gc/cdh/config.toml
          register: __test_cdh_config

        - name: Verify CDH config contains KBS URL and cert content
          when: __test_cdh_config.stat.exists
          block:
            - name: Read CDH config file
              ansible.builtin.slurp:
                src: /etc/trustee-gc/cdh/config.toml
              register: __test_cdh_content

            - name: Assert CDH config contains the KBS URL
              ansible.builtin.assert:
                that:
                  - >-
                    trustee_client_kbs_url in
                    (__test_cdh_content.content | b64decode)
                fail_msg: >-
                  KBS URL '{{ trustee_client_kbs_url }}' not found in
                  /etc/trustee-gc/cdh/config.toml

            - name: Assert CDH config contains cert content from path
              ansible.builtin.assert:
                that:
                  - >-
                    'MIIBIjANBgkq' in (__test_cdh_content.content | b64decode)
                fail_msg: >-
                  KBS cert content from path not found in
                  /etc/trustee-gc/cdh/config.toml

        - name: Stat KBS certificate file
          ansible.builtin.stat:
            path: /etc/trustee-gc/server.crt
          register: __test_kbs_cert

        - name: Assert KBS certificate was written from path
          ansible.builtin.assert:
            that: __test_kbs_cert.stat.exists
            fail_msg: "KBS certificate /etc/trustee-gc/server.crt was not written from path"

        - name: Assert server.crt contains expected cert content
          ansible.builtin.slurp:
            src: /etc/trustee-gc/server.crt
          register: __test_server_crt_content

        - name: Verify server.crt content matches cert from path
          ansible.builtin.assert:
            that:
              - >-
                __test_cert_content in (__test_server_crt_content.content | b64decode)
            fail_msg: "KBS certificate /etc/trustee-gc/server.crt content does not match cert from path"
      always:
        - name: Cleanup trustee_client test resources
          ansible.builtin.include_tasks:
            file: tasks/cleanup.yml
          tags:
            - tests::cleanup
