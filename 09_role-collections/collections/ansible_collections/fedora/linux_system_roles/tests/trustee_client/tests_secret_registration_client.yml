# SPDX-License-Identifier: MIT
---
- name: Ensure secret registration client is deployed when enabled
  hosts: all
  vars:
    trustee_client_trustee_gc: true
    trustee_client_secret_registration_enabled: true
  tasks:
    - name: Run the tests
      block:
        - name: Run the role
          ansible.builtin.include_tasks:
            file: tasks/run_role_with_clear_facts.yml
          vars:
            __sr_public: true

        - name: Flush handlers to start services created by the role
          ansible.builtin.meta: flush_handlers

        - name: Collect package facts
          ansible.builtin.package_facts:
            manager: auto
          no_log: true

        - name: Assert required packages are installed
          ansible.builtin.assert:
            that: item in ansible_facts.packages
            fail_msg: "Required package {{ item }} is not installed"
          loop: "{{ __trustee_client_trustee_gc_packages + __trustee_client_secret_registration_client_packages }}"

        - name: Check secret registration client script exists
          ansible.builtin.stat:
            path: /usr/local/bin/secret_registration_client.sh
          register: client_script

        - name: Assert secret registration client script was deployed
          ansible.builtin.assert:
            that: client_script.stat.exists
            fail_msg: "Secret registration client script was not deployed"

        - name: Assert secret registration client service is enabled
          ansible.builtin.service:
            name: "secret_registration_client"
            enabled: true
          check_mode: true
      always:
        - name: Cleanup trustee_client test resources
          ansible.builtin.include_tasks:
            file: tasks/cleanup.yml
          tags:
            - tests::cleanup
