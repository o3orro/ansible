---
- name: Setup snapshot
  hosts: all
  tasks:
    - name: Set platform/version specific variables
      include_role:
        name: fedora.linux_system_roles.trustee_client
        tasks_from: set_vars.yml
        public: true

    - name: Install test packages
      package:
        name: "{{ (__trustee_client_trustee_gc_packages | default([])) + (__trustee_client_encrypt_disk_packages | default([])) | unique }}"
        state: present
