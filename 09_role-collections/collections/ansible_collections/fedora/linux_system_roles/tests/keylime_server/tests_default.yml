# SPDX-License-Identifier: MIT
---
- name: Ensure that the role runs with default parameters
  hosts: all
  tasks:
    - name: See if /dev/log exists for the fingerprint check
      ansible.builtin.stat:
        path: /dev/log
      register: __register_dev_log

    - name: Set the start time for the journal search
      ansible.builtin.set_fact:
        __journal_start_time: "{{ ansible_facts['date_time']['date'] ~ ' ' ~ ansible_facts['date_time']['time'] }}"
      when: __register_dev_log.stat.exists

    - name: Run the role with public role variables
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        __sr_public: true

  # look for the exact module invocation, not some other message that might contain the string
    - name: Check system journal contains role fingerprints
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: >-
          set -eo pipefail;
          journalctl --since "{{ __journal_start_time }}" --no-pager |
          grep -v " Invoked with" | grep "sr_fingerprint.*begin system_role:keylime_server" ||
          { echo ERROR: BEGIN fingerprint not found; exit 1; };
          journalctl --since "{{ __journal_start_time }}" --no-pager |
          grep -v " Invoked with" | grep "sr_fingerprint.*success system_role:keylime_server" ||
          { echo ERROR: SUCCESS fingerprint not found; exit 1; }
      changed_when: false
      when: __register_dev_log.stat.exists

    - name: Check header for ansible_managed, fingerprint - legacy
      include_tasks: tasks/check_header.yml
      vars:
        __file: /etc/keylime.conf
        __fingerprint: system_role:keylime_server
      when: __keylime_server_legacy_config

    - name: Check header for ansible_managed, fingerprint
      include_tasks: tasks/check_header.yml
      vars:
        __file: "{{ item }}"
        __fingerprint: system_role:keylime_server
      loop:
        - "{{ __keylime_server_verifier_snippet_dir }}/{{ __keylime_server_verifier_ip_config }}"
        - "{{ __keylime_server_verifier_snippet_dir }}/{{ __keylime_server_verifier_database_config }}"
        - "{{ __keylime_server_verifier_snippet_dir }}/{{ __keylime_server_verifier_keys_certs_config }}"
        - "{{ __keylime_server_registrar_snippet_dir }}/{{ __keylime_server_registrar_ip_config }}"
        - "{{ __keylime_server_registrar_snippet_dir }}/{{ __keylime_server_registrar_database_config }}"
        - "{{ __keylime_server_registrar_snippet_dir }}/{{ __keylime_server_registrar_keys_certs_config }}"
      when: not __keylime_server_legacy_config
