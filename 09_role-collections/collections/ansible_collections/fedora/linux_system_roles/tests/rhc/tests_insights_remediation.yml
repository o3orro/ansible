---
- name: Test for insights remediation enabled & disabled
  hosts: all

  tasks:
    - name: Setup Insights
      import_tasks: tasks/setup_insights.yml

    - name: Ensure ansible_facts used by the test
      setup:
        gather_subset:
          - "!all"
          - "!min"
          - distribution_version

    - name: Skip if the RHEL version is older than 8.4
      meta: end_play
      when:
        - ansible_facts["distribution_version"] is version("8.4", "<")

    - name: Test remediation
      block:
        - name: Register insights and enable remediation
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            __sr_public: true
            rhc_auth:
              login:
                username: "{{ lsr_rhc_test_data.reg_username }}"
                password: "{{ lsr_rhc_test_data.reg_password }}"
            rhc_insights:
              remediation: present
              state: present
            rhc_organization: "{{ lsr_rhc_test_data.reg_organization }}"
            rhc_server:
              hostname: "{{ lsr_rhc_test_data.candlepin_host }}"
              port: "{{ lsr_rhc_test_data.candlepin_port }}"
              prefix: "{{ lsr_rhc_test_data.candlepin_prefix }}"
              insecure: "{{ lsr_rhc_test_data.candlepin_insecure }}"
            rhc_baseurl: "{{ lsr_rhc_test_data.baseurl | d(omit) }}"
            rhc_proxy: "{{ rhc_external_proxy | default({}) }}"

        - name: Set the fact for the systemd service
          set_fact:
            yggdrasil_systemd_service: "{{ __rhc_yggdrasil_systemd_service + '.service' }}"

        - name: Get service_facts
          service_facts:
          no_log: "{{ ansible_verbosity < 3 }}"

        - name: Show yggdrasil_systemd_service status should be enabled
          debug:
            var: ansible_facts.services.get(yggdrasil_systemd_service, "not found")

        - name: Check remediation is enabled
          assert:
            that:
              - yggdrasil_systemd_service in ansible_facts.services
              - ansible_facts.services[yggdrasil_systemd_service].status == 'enabled'

        - name: Disable remediation
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            rhc_insights:
              remediation: absent

        - name: Get service_facts
          service_facts:
          no_log: "{{ ansible_verbosity < 3 }}"

        - name: Show yggdrasil_systemd_service status should be disabled
          debug:
            var: ansible_facts.services.get(yggdrasil_systemd_service, "not found")

      # NOTE: Shutting down rhcd on EL8 sometimes can give the following error:
      # cannot stop workers: cannot stop worker: cannot stop worker: cannot stop process os: process already finished
      # which results in the status being 'failed' instead of 'disabled'
      # https://access.redhat.com/solutions/7106551
        - name: Check remediation is disabled
          assert:
            that:
              - __info != {}
              - __status == 'disabled' or (__state == 'stopped' and __status == 'failed')
          vars:
            __info: "{{ ansible_facts.services.get(yggdrasil_systemd_service, {}) }}"
            __status: "{{ __info.get('status', '') }}"
            __state: "{{ __info.get('state', '') }}"

        - name: Disable remediation (noop)
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            rhc_insights:
              remediation: absent

      always:
        - name: Unregister
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            rhc_state: absent
