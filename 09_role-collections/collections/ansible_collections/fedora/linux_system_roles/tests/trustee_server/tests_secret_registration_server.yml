# SPDX-License-Identifier: MIT
---
- name: Ensure secret registration server is deployed when enabled
  hosts: all
  vars:
    trustee_server_trustee: true
    trustee_server_secret_registration_enabled: true
  tasks:
    - name: Run tests for secret registration server
      block:
        - name: Include trustee_server role
          ansible.builtin.include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            __sr_public: true

        - name: Flush handlers to start services
          ansible.builtin.meta: flush_handlers

        - name: Gather package facts
          ansible.builtin.package_facts:
            manager: auto

        - name: Assert required packages are installed
          ansible.builtin.assert:
            that: item in ansible_facts.packages
            fail_msg: "Required package {{ item }} is not installed"
          loop: "{{ __trustee_server_trustee_packages + __trustee_server_secret_registration_packages }}"

        - name: Check secret registration server script exists
          ansible.builtin.stat:
            path: /usr/local/bin/secret_registration_server.py
          register: __trustee_server_secret_reg_script

        - name: Assert secret registration server script was deployed
          ansible.builtin.assert:
            that: __trustee_server_secret_reg_script.stat.exists
            fail_msg: "Secret registration server script was not deployed"

        - name: Check secret registration server service is running
          ansible.builtin.service:
            name: "secret_registration_server"
            state: started
          check_mode: true
      always:
        - name: Run test cleanup
          ansible.builtin.include_tasks: tasks/cleanup.yml
          tags:
            - tests::cleanup
