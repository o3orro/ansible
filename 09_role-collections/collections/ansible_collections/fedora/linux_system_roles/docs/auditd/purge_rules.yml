---
# Remove all rules.d fragments, then keep only custom.rules when it already
# matches auditd_rules (idempotent second run: changed: false).
- name: Purge rules.d then manage custom.rules
  hosts: all
  vars:
    auditd_purge_rules: true
    auditd_rules:
      - action: always
        filter: exit
        arch: b64
        syscall: open
        path: /etc/shadow
        permission:
          - read
        keyname: shadow_watch
  roles:
    - fedora.linux_system_roles.auditd
