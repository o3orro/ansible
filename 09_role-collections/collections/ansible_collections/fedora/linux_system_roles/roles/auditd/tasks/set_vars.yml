---
- name: Ensure ansible_facts used by role
  ansible.builtin.setup:
    gather_subset: "{{ __auditd_required_facts_subsets }}"
  when: __auditd_required_facts | difference(ansible_facts.keys() | list) | length > 0

- name: Record role begin fingerprint
  fedora.linux_system_roles.sr_fingerprint:
    sr_message: >-
      begin system_role:auditd ansible_version={{ ansible_version.full }}
      {{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_version'] }}

- name: Determine if system is ostree and set flag
  when: not __auditd_is_ostree is defined
  block:
    - name: Check if system is ostree
      ansible.builtin.stat:
        path: /run/ostree-booted
      register: __ostree_booted_stat

    - name: Set flag to indicate system is ostree
      ansible.builtin.set_fact:
        __auditd_is_ostree: "{{ __ostree_booted_stat.stat.exists }}"

- name: Set platform/version specific variables
  ansible.builtin.include_vars: "{{ __vars_file }}"
  loop:
    - "{{ ansible_facts['os_family'] }}.yml"
    - "{{ ansible_facts['distribution'] }}.yml"
    - >-
      {{ ansible_facts['distribution'] ~ '_' ~
      ansible_facts['distribution_major_version'] }}.yml
    - >-
      {{ ansible_facts['distribution'] ~ '_' ~
      ansible_facts['distribution_version'] }}.yml
  vars:
    __vars_file: "{{ role_path }}/vars/{{ item }}"
  when: __vars_file is file

- name: Resolve package names for OS family
  ansible.builtin.set_fact:
    __auditd_packages: "{{ __auditd_packages_map[ansible_facts['os_family']] | default(__auditd_packages_map['default']) }}"
