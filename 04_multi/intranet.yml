---
    ########################################
    # 1) 패키지 설치 - httpd, firewalld
    # 2) 웹서버 설정 - /var/www/html/index.html
    # 3) 웹서비스 기동 - httpd, firewalld
    # 4) 방화벽 등록 - http
    #########################################
- name: 0) 웹 서버 설정
  hosts: web1
  tasks:
    - name: 1) 패키지 설치
      ansible.builtin.yum:
        name:
          - httpd
          - firewalld
        state: present

    - name: 2) 서비스 설정
      ansible.builtin.copy:
        content: "HELLO\n"
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: '0644'

    - name: 3) 서비스 기동
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: 3) 서비스 기동
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: 4) 방화벽 등록
      ansible.posix.firewalld:      
        service: http
        permanent: true
        immediate: true
        state: enabled
  
- name: 1) 웹 확인
  hosts: localhost
  tasks:  
    - name: 1) web1 웹 접속 확인
      ansible.builtin.uri:
        url: http://web1.example.com
        return_content: true
        status_code: 200


