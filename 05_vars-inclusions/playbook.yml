---
- name: 0) 파일 서버 패키지 설치
  hosts: fileservers
  gather_facts: false
  tasks:
    - name: 1) 변수 선언
      ansible.builtin.include_vars:
        file: package.yml
    
    - name: 2) 패키지 설치 - httpd
      ansible.builtin.include_tasks:
        file: install_package.yml
    
    - name: 3) 패키지 설치 - epel-release
      ansible.builtin.include_tasks:
        file: install_package.yml
      vars:
        package:
          web_pkg: epel-release
    
    - name: 4) 패키지 설치 - tomcat
      ansible.builtin.include_tasks:
        file: install_package.yml
      vars:
        package:
          web_pkg: tomcat
