---
- name: restore_factcheck
  hosts: all
  gather_facts: false
  tasks:
    - name: 1) firewall
      firewalld:
        service: http
        permanent: yes
        immediate: yes
        state: disabled 

    - name: 2) 서비스 설정 제거 - /var/www/html/index.php
      ansible.builtin.file:
        path: /var/www/html/index.php
        state: absent
      ignore_errors: true

    - name: 2) 서비스 종료 - httpd
      ansible.builtin.systemd:
        name: httpd
        state: stopped
        enabled: false       

    - name: 2) 서비스 종료 - firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: stopped
        enabled: false   


