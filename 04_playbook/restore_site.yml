---
- name: 0) 웹서버 설정 삭제
  hosts: all
  tasks:
    - name: 1) 방화벽 삭제(firewalld module) - http(80/tcp)    
      ansible.posix.firewalld:
        service: http
        permanent: true
        state: disabled
        immediate: true
      ignore_errors: true  

    - name: 2) 웹서비스 종료(service module) - httpd.service
      ansible.builtin.service:
        name: httpd
        state: stopped
        enabled: false
      ignore_errors: true 

    - name: 2) 웹서비스 종료(service module) - firewalld.service
      ansible.builtin.service:
        name: firewalld
        state: stopped
        enabled: false 
      ignore_errors: true 
      
    - name: 3) 웹서비스 설정 삭제(file module) - /var/www/html/index.html
      ansible.builtin.file:
        path: /var/www/html/index.html
        state: absent

    - name: 4) 패키지 삭제(yum module) - httpd
      ansible.builtin.yum:
        name: httpd
        state: absent
      

