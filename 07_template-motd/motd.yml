---
- name: 0) 파일 배포
  hosts: all
  gather_facts: true
  vars:
    system_owner: webmaster@example.com
  tasks:
    - name: 1) 파일 배포 - /etc/motd
      # templates/motd.j2 -- template --> /etc/motd
      ansible.builtin.template:
        src: templates/motd.j2
        dest: /etc/motd
        owner: root
        group: root
        mode: '0644'
      